name: Release

# Trigger: git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build & Sign (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write     # cosign OIDC token exchange + attestation
      attestations: write # actions/attest-build-provenance

    strategy:
      matrix:
        include:
          - goarch: amd64
            suffix: windows-amd64.exe
          - goarch: arm64
            suffix: windows-arm64.exe

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/michaelsanford/wtop/internal/version.Version=${{ github.ref_name }}" \
            -o wtop-${{ github.ref_name }}-${{ matrix.suffix }} \
            ./cmd/wtop/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-path: wtop-${{ github.ref_name }}-${{ matrix.suffix }}

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Sign with cosign (keyless, GitHub OIDC)
        run: |
          cosign sign-blob --yes \
            wtop-${{ github.ref_name }}-${{ matrix.suffix }} \
            --bundle wtop-${{ github.ref_name }}-${{ matrix.suffix }}.bundle

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binary-${{ matrix.goarch }}
          path: |
            wtop-${{ github.ref_name }}-${{ matrix.suffix }}
            wtop-${{ github.ref_name }}-${{ matrix.suffix }}.bundle

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cyclonedx-gomod
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.9.0

      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-gomod app \
            -licenses \
            -json \
            -output wtop-${{ github.ref_name }}-sbom.cdx.json \
            -main ./cmd/wtop \
            .

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: wtop-${{ github.ref_name }}-sbom.cdx.json

  release:
    name: Create Draft Release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          path: assets/
          merge-multiple: true

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            assets/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft
